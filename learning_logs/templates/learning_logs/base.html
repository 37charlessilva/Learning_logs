<p>
    <a href="{% url 'learning_logs:index' %}">Learning_logs</a> -
    <a href="{% url 'learning_logs:topics' %}">Topics</a> -

    {% if user.is_authenticated %}
        Hello, {{ user.username }}.
        
        <a href="#" onclick="document.getElementById('logout-form').submit(); return false;" style="color: black">
            Log out
        </a>

        <form id="logout-form" action="{% url 'users:logout' %}" method="post" style="display:none;">
            {% csrf_token %}
        </form>

    {% else %}
      <a href="{% url 'users:register' %}">register</a> -
      <a href="{% url 'users:login' %}">Log in</a>
    {% endif %}
</p>

{% block content %}{% endblock content %}
